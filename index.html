<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>똑비서</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <!-- Supabase JS SDK (Realtime용) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div id="app">

  <!-- ===== 할일 탭 ===== -->
  <div id="tab-todo" class="tab-content active">
    <div id="calendar-section">
      <div id="calendar-header">
        <button id="cal-prev" class="cal-nav">&#8249;</button>
        <div id="cal-title">
          <span id="cal-year" class="cal-year-btn"></span>년
          <span id="cal-month" class="cal-month-btn"></span>월
        </div>
        <button id="cal-next" class="cal-nav">&#8250;</button>
      </div>
      <div id="calendar-weekdays">
        <span class="wd sun">일</span><span class="wd">월</span><span class="wd">화</span>
        <span class="wd">수</span><span class="wd">목</span><span class="wd">금</span><span class="wd sat">토</span>
      </div>
      <div id="calendar-grid"></div>
    </div>
    <div id="selected-date-bar">
      <span id="selected-date-label"></span>
      <div id="date-bar-actions">
        <button id="cal-toggle-btn" title="달력 접기/펴기">
          <svg id="cal-toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
          </svg>
        </button>
        <button id="fab-add">＋</button>
      </div>
    </div>
    <div id="todo-list-section">
      <ul id="todo-list"></ul>
    </div>
  </div>

  <!-- ===== 주간 탭 ===== -->
  <div id="tab-weekly" class="tab-content">
    <div id="weekly-header">
      <button id="week-prev" class="week-nav">&#8249;</button>
      <span id="week-range-label"></span>
      <div id="week-header-right">
        <button id="week-important-btn" class="week-filter-btn" title="주간 표시 항목만 보기">중요</button>
        <button id="week-next" class="week-nav">&#8250;</button>
      </div>
    </div>
    <div id="week-day-row-wrap">
      <div id="week-day-row"></div>
    </div>
    <div id="week-selected-bar">
      <span id="week-selected-label"></span>
    </div>
    <div id="weekly-list-section">
      <div id="weekly-todo-list"></div>
    </div>
  </div>

  <!-- ===== 검색 탭 ===== -->
  <div id="tab-search" class="tab-content">
    <div id="search-container">
      <div id="search-input-wrap">
        <input type="text" id="search-input" placeholder="검색어를 입력하세요..." />
        <button id="search-clear">✕</button>
      </div>
      <ul id="search-results"></ul>
    </div>
  </div>

  <!-- ===== 하단 탭바 ===== -->
  <nav id="bottom-nav">
    <button class="nav-btn active" data-tab="todo" id="nav-todo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <line x1="8" y1="14" x2="8.01" y2="14" stroke-width="3"/><line x1="12" y1="14" x2="16" y2="14"/>
        <line x1="8" y1="18" x2="8.01" y2="18" stroke-width="3"/><line x1="12" y1="18" x2="16" y2="18"/>
      </svg>
      <span>할일</span>
    </button>
    <button class="nav-btn" data-tab="weekly" id="nav-weekly">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <line x1="3" y1="15" x2="21" y2="15"/>
        <line x1="8" y1="10" x2="8" y2="20"/>
      </svg>
      <span>주간</span>
    </button>
    <button class="nav-btn" data-tab="search" id="nav-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span>검색</span>
    </button>
    <button class="nav-btn" data-tab="settings" id="nav-settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span>설정</span>
    </button>
  </nav>

</div>

<!-- ===== 설정 슬라이드 패널 ===== -->
<div id="settings-overlay" class="hidden"></div>
<div id="settings-panel" class="hidden">
  <div id="settings-panel-header">
    <span>설정</span>
    <button id="settings-close">✕</button>
  </div>
  <div id="settings-menu">
    <button class="settings-menu-item" id="menu-repeats">
      <span class="settings-menu-icon">🔁</span>
      <span class="settings-menu-label">반복함</span>
      <span class="settings-menu-arrow">›</span>
    </button>
  </div>
</div>

<!-- ===== 반복함 패널 ===== -->
<div id="repeats-panel" class="hidden">
  <div id="repeats-panel-header">
    <button id="repeats-back">‹</button>
    <span>반복함</span>
  </div>
  <div id="repeats-list"></div>
</div>

<!-- ===== 모달 ===== -->
<div id="modal-overlay" class="hidden">
  <div id="modal-box">
    <div id="modal-header">
      <span id="modal-title-label">할일 추가</span>
      <button id="modal-close">✕</button>
    </div>
    <div id="modal-title-row">
      <input type="text" id="input-title" placeholder="할일을 입력하세요..." autocomplete="off" />
      <label id="detail-toggle-label">
        <input type="checkbox" id="detail-toggle" />
        <span>상세</span>
      </label>
    </div>
    <div id="detail-section" class="hidden">
      <div class="detail-row">
        <label class="detail-label">중요도</label>
        <div id="importance-btns">
          <button class="imp-btn" data-val="0">없음</button>
          <button class="imp-btn" data-val="1">낮음</button>
          <button class="imp-btn" data-val="2">보통</button>
          <button class="imp-btn" data-val="3">높음</button>
        </div>
        <label id="weekly-flag-label">
          <input type="checkbox" id="input-weekly-flag" />
          <span>주간</span>
        </label>
      </div>
      <div class="detail-row">
        <label class="detail-label">메모</label>
        <textarea id="input-memo" placeholder="메모 (선택사항)"></textarea>
      </div>
      <div class="detail-row">
        <label class="detail-label">날짜</label>
        <input type="date" id="input-date" />
      </div>
      <div class="detail-row">
        <label class="detail-label">상기</label>
        <input type="number" id="input-remind" placeholder="0" min="0" max="30" value="0" />
        <span class="detail-unit">일 전에도 추가</span>
        <button id="repeat-btn" class="repeat-btn" title="반복 설정">🔁 반복</button>
      </div>
    </div>
    <button id="modal-save">저장</button>
  </div>
</div>

<!-- ===== 반복 설정 모달 ===== -->
<div id="repeat-overlay" class="hidden">
  <div id="repeat-box">
    <div id="repeat-header">
      <span>반복 설정</span>
      <button id="repeat-modal-close">✕</button>
    </div>

    <!-- 반복 타입 선택 -->
    <div id="rtype-row">
      <button class="rtype-btn active" data-type="none">없음</button>
      <button class="rtype-btn" data-type="daily">매일</button>
      <button class="rtype-btn" data-type="weekly">매주</button>
      <button class="rtype-btn" data-type="monthly">매월</button>
      <button class="rtype-btn" data-type="yearly">매년</button>
      <button class="rtype-btn" data-type="custom">커스텀</button>
    </div>

    <!-- 매주: 요일 선택 -->
    <div id="repeat-weekly-wrap" class="repeat-detail hidden">
      <label class="repeat-sub-label">요일 선택</label>
      <div id="repeat-weekday-btns">
        <button class="rday-btn" data-d="0">일</button>
        <button class="rday-btn" data-d="1">월</button>
        <button class="rday-btn" data-d="2">화</button>
        <button class="rday-btn" data-d="3">수</button>
        <button class="rday-btn" data-d="4">목</button>
        <button class="rday-btn" data-d="5">금</button>
        <button class="rday-btn" data-d="6">토</button>
      </div>
    </div>

    <!-- 매월: N일 or X째주 Y요일 -->
    <div id="repeat-monthly-wrap" class="repeat-detail hidden">
      <div id="repeat-monthly-mode-row">
        <button class="rmonth-mode-btn active" data-mode="day">N일</button>
        <button class="rmonth-mode-btn" data-mode="week">X째주 Y요일</button>
      </div>
      <div id="repeat-monthly-day-wrap" class="repeat-option">
        <label>매월</label>
        <input type="number" id="repeat-monthly-day" min="1" max="31" placeholder="1" />
        <span>일</span>
      </div>
      <div id="repeat-monthly-week-wrap" class="repeat-option hidden">
        <select id="repeat-monthly-week">
          <option value="1">첫째</option>
          <option value="2">둘째</option>
          <option value="3">셋째</option>
          <option value="4">넷째</option>
          <option value="5">마지막</option>
        </select>
        <select id="repeat-monthly-weekday">
          <option value="0">일요일</option>
          <option value="1">월요일</option>
          <option value="2">화요일</option>
          <option value="3">수요일</option>
          <option value="4">목요일</option>
          <option value="5">금요일</option>
          <option value="6">토요일</option>
        </select>
      </div>
    </div>

    <!-- 매년: 월/일 선택 -->
    <div id="repeat-yearly-wrap" class="repeat-detail hidden">
      <div class="repeat-option">
        <label>매년</label>
        <select id="repeat-yearly-month">
          <option value="1">1월</option><option value="2">2월</option>
          <option value="3">3월</option><option value="4">4월</option>
          <option value="5">5월</option><option value="6">6월</option>
          <option value="7">7월</option><option value="8">8월</option>
          <option value="9">9월</option><option value="10">10월</option>
          <option value="11">11월</option><option value="12">12월</option>
        </select>
        <input type="number" id="repeat-yearly-day" min="1" max="31" placeholder="1" />
        <span>일</span>
      </div>
    </div>

    <!-- 커스텀: 요일 복수 선택 -->
    <div id="repeat-custom-wrap" class="repeat-detail hidden">
      <label class="repeat-sub-label">요일 선택 (복수)</label>
      <div id="repeat-custom-day-btns">
        <button class="rday-btn" data-d="0">일</button>
        <button class="rday-btn" data-d="1">월</button>
        <button class="rday-btn" data-d="2">화</button>
        <button class="rday-btn" data-d="3">수</button>
        <button class="rday-btn" data-d="4">목</button>
        <button class="rday-btn" data-d="5">금</button>
        <button class="rday-btn" data-d="6">토</button>
      </div>
    </div>

    <!-- 종료일 -->
    <div class="repeat-option">
      <label class="repeat-end-label">
        <input type="checkbox" id="repeat-end-toggle" />
        <span>종료일 설정</span>
      </label>
      <div id="repeat-end-date-wrap" class="hidden">
        <input type="date" id="repeat-end-date" />
      </div>
    </div>

    <div id="repeat-footer">
      <button id="repeat-cancel-btn" class="repeat-footer-btn cancel">취소</button>
      <button id="repeat-confirm-btn" class="repeat-footer-btn confirm">확인</button>
    </div>
  </div>
</div>

<!-- ===== 액션 팝업 ===== -->
<div id="action-popup" class="hidden">
  <div id="action-box">
    <button class="action-btn" id="action-tomorrow">📅 1일 뒤</button>
    <button class="action-btn" id="action-pick-date">🗓 날짜 선택</button>
    <button class="action-btn danger" id="action-delete">🗑 삭제</button>
  </div>
  <input type="date" id="action-date-picker" class="hidden" />
</div>

<!-- ===== 년도 팝업 ===== -->
<div id="year-popup" class="hidden">
  <div id="year-box">
    <label>년도 입력</label>
    <input type="number" id="year-input" min="2000" max="2099" />
    <div id="year-btns">
      <button id="year-cancel">취소</button>
      <button id="year-confirm">확인</button>
    </div>
  </div>
</div>

<!-- ===== 월 팝업 ===== -->
<div id="month-popup" class="hidden">
  <div id="month-box">
    <div id="month-grid">
      <button class="month-btn" data-m="1">1월</button><button class="month-btn" data-m="2">2월</button>
      <button class="month-btn" data-m="3">3월</button><button class="month-btn" data-m="4">4월</button>
      <button class="month-btn" data-m="5">5월</button><button class="month-btn" data-m="6">6월</button>
      <button class="month-btn" data-m="7">7월</button><button class="month-btn" data-m="8">8월</button>
      <button class="month-btn" data-m="9">9월</button><button class="month-btn" data-m="10">10월</button>
      <button class="month-btn" data-m="11">11월</button><button class="month-btn" data-m="12">12월</button>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/sync.js"></script>
<script src="js/calendar.js"></script>
<script src="js/repeat.js"></script>
<script src="js/modal.js"></script>
<script src="js/gesture.js"></script>
<script src="js/todo.js"></script>
<script src="js/search.js"></script>
<script src="js/weekly.js"></script>
<script src="js/settings.js"></script>
<script src="js/app.js"></script>

</body>
</html>
