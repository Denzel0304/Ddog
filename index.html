<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>똑비서</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    /* ── 스플래시 화면 ── */
    #splash-screen {
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 24px;
    }
    #splash-logo {
      width: 120px;
      height: 120px;
      animation: splash-pulse 1.8s ease-in-out infinite;
    }
    #splash-title {
      font-size: 22px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      letter-spacing: 2px;
      font-family: 'Noto Sans KR', sans-serif;
    }
    @keyframes splash-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.75; transform: scale(0.96); }
    }

    /* ── 로그인 화면 ── */
    #login-screen {
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9998;
    }
    #login-box {
      width: 100%;
      max-width: 340px;
      padding: 40px 28px 36px;
      background: #16213e;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #login-logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    #login-logo {
      width: 72px;
      height: 72px;
    }
    #login-title {
      font-size: 20px;
      font-weight: 700;
      color: #e0e0e0;
      letter-spacing: 1px;
    }
    #login-box input {
      width: 100%;
      padding: 13px 16px;
      border-radius: 10px;
      border: 1.5px solid #2a2a4a;
      background: #0f0f23;
      color: #e0e0e0;
      font-size: 15px;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s;
      font-family: 'Noto Sans KR', sans-serif;
    }
    #login-box input:focus { border-color: #7b68ee; }
    #login-btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: #7b68ee;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
      font-family: 'Noto Sans KR', sans-serif;
      margin-top: 4px;
    }
    #login-btn:hover  { background: #6a5acd; }
    #login-btn:active { background: #5a4abf; }
    #login-btn:disabled { background: #4a4a6a; cursor: not-allowed; }
    #login-error {
      color: #ff6b7a;
      font-size: 13px;
      text-align: center;
      min-height: 16px;
      line-height: 1.4;
    }
    #login-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ===== 스플래시 화면 (항상 먼저 표시) ===== -->
<div id="splash-screen">
  <img id="splash-logo" src="똑비서_로고_1.png" alt="똑비서" />
  <div id="splash-title">똑비서</div>
</div>

<!-- ===== 로그인 화면 (세션 없을 때만 표시) ===== -->
<div id="login-screen">
  <div id="login-box">
    <div id="login-logo-wrap">
      <img id="login-logo" src="똑비서_로고_1.png" alt="똑비서" />
      <div id="login-title">똑비서</div>
    </div>
    <form id="login-form" autocomplete="off">
      <input type="email" id="login-email" placeholder="이메일" required autocomplete="username" />
      <input type="password" id="login-password" placeholder="비밀번호" required autocomplete="current-password" />
      <div id="login-error"></div>
      <button type="submit" id="login-btn">
        <span id="login-btn-text">로그인</span>
        <span id="login-spinner"></span>
      </button>
    </form>
  </div>
</div>

<div id="app" style="display:none">

  <!-- ===== 할일 탭 ===== -->
  <div id="tab-todo" class="tab-content active">
    <div id="calendar-section">
      <div id="calendar-header">
        <button id="cal-prev" class="cal-nav">&#8249;</button>
        <div id="cal-title">
          <span id="cal-year" class="cal-year-btn"></span>년
          <span id="cal-month" class="cal-month-btn"></span>월
        </div>
        <button id="cal-next" class="cal-nav">&#8250;</button>
      </div>
      <div id="calendar-weekdays">
        <span class="wd sun">일</span><span class="wd">월</span><span class="wd">화</span>
        <span class="wd">수</span><span class="wd">목</span><span class="wd">금</span><span class="wd sat">토</span>
      </div>
      <div id="calendar-grid"></div>
    </div>
    <div id="selected-date-bar">
      <span id="selected-date-label"></span>
      <div id="date-bar-actions" style="visibility:hidden">
        <button id="cal-toggle-btn" title="달력 접기/펴기">
          <svg id="cal-toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
          </svg>
        </button>
        <button id="fab-add">＋</button>
      </div>
    </div>
    <div id="todo-list-section">
      <ul id="todo-list"></ul>
    </div>
  </div>

  <!-- ===== 주간 탭 ===== -->
  <div id="tab-weekly" class="tab-content">
    <div id="weekly-header">
      <button id="week-prev" class="week-nav">&#8249;</button>
      <span id="week-range-label"></span>
      <div id="week-header-right">
        <button id="week-important-btn" class="week-filter-btn" title="주간 표시 항목만 보기">중요</button>
        <button id="week-next" class="week-nav">&#8250;</button>
      </div>
    </div>
    <div id="week-day-row-wrap">
      <div id="week-day-row"></div>
    </div>
    <div id="week-selected-bar">
      <span id="week-selected-label"></span>
    </div>
    <div id="weekly-list-section">
      <div id="weekly-todo-list"></div>
    </div>
  </div>

  <!-- ===== 검색 탭 ===== -->
  <div id="tab-search" class="tab-content">
    <div id="search-container">
      <div id="search-input-wrap">
        <input type="text" id="search-input" placeholder="검색어를 입력하세요..." />
        <button id="search-clear">✕</button>
      </div>
      <ul id="search-results"></ul>
    </div>
  </div>

  <!-- ===== 하단 탭바 ===== -->
  <nav id="bottom-nav">
    <button class="nav-btn active" data-tab="todo" id="nav-todo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <line x1="8" y1="14" x2="8.01" y2="14" stroke-width="3"/><line x1="12" y1="14" x2="16" y2="14"/>
        <line x1="8" y1="18" x2="8.01" y2="18" stroke-width="3"/><line x1="12" y1="18" x2="16" y2="18"/>
      </svg>
      <span>할일</span>
    </button>
    <button class="nav-btn" data-tab="weekly" id="nav-weekly">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <line x1="3" y1="15" x2="21" y2="15"/>
        <line x1="8" y1="10" x2="8" y2="20"/>
      </svg>
      <span>주간</span>
    </button>
    <button class="nav-btn" data-tab="search" id="nav-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span>검색</span>
    </button>
    <button class="nav-btn" data-tab="settings" id="nav-settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span>설정</span>
    </button>
  </nav>

</div>

<!-- ===== 설정 슬라이드 패널 ===== -->
<div id="settings-overlay" class="hidden"></div>
<div id="settings-panel" class="hidden">
  <div id="settings-panel-header">
    <span>설정</span>
    <button id="settings-close">✕</button>
  </div>
  <div id="settings-menu">
    <button class="settings-menu-item" id="menu-repeats">
      <span class="settings-menu-icon">🔁</span>
      <span class="settings-menu-label">반복함</span>
      <span class="settings-menu-arrow">›</span>
    </button>
  </div>
</div>

<!-- ===== 반복함 패널 ===== -->
<div id="repeats-panel" class="hidden">
  <div id="repeats-panel-header">
    <button id="repeats-back">‹</button>
    <span>반복함</span>
  </div>
  <div id="repeats-list"></div>
</div>

<!-- ===== 모달 ===== -->
<div id="modal-overlay" class="hidden">
  <div id="modal-box">
    <div id="modal-header">
      <span id="modal-title-label">할일 추가</span>
      <button id="modal-close">✕</button>
    </div>
    <div id="modal-title-row">
      <input type="text" id="input-title" placeholder="할일을 입력하세요..." autocomplete="off" />
      <label id="detail-toggle-label">
        <input type="checkbox" id="detail-toggle" />
        <span>상세</span>
      </label>
    </div>
    <div id="detail-section" class="hidden">
      <div class="detail-row">
        <label class="detail-label">중요도</label>
        <div id="importance-btns">
          <button class="imp-btn" data-val="0">없음</button>
          <button class="imp-btn" data-val="1">낮음</button>
          <button class="imp-btn" data-val="2">보통</button>
          <button class="imp-btn" data-val="3">높음</button>
        </div>
        <label id="weekly-flag-label">
          <input type="checkbox" id="input-weekly-flag" />
          <span>주간</span>
        </label>
      </div>
      <div class="detail-row">
        <label class="detail-label">메모</label>
        <textarea id="input-memo" placeholder="메모 (선택사항)"></textarea>
      </div>
      <div class="detail-row">
        <label class="detail-label">날짜</label>
        <input type="date" id="input-date" />
      </div>
      <div class="detail-row">
        <label class="detail-label">상기</label>
        <input type="number" id="input-remind" placeholder="0" min="0" max="30" value="0" />
        <span class="detail-unit">일 전</span>
        <button id="repeat-btn" class="repeat-btn" title="반복 설정">🔁 반복</button>
        <label id="checklist-toggle-label">
          <input type="checkbox" id="checklist-toggle" />
          <span>리스트</span>
        </label>
        <button id="checklist-open-btn" class="checklist-open-btn hidden" title="체크리스트 편집">☑ 리스트</button>
      </div>
    </div>
    <button id="modal-save">저장</button>
  </div>
</div>

<!-- ===== 반복 설정 모달 ===== -->
<div id="repeat-overlay" class="hidden">
  <div id="repeat-box">
    <div id="repeat-header">
      <span>반복 설정</span>
      <button id="repeat-modal-close">✕</button>
    </div>
    <div id="rtype-row">
      <button class="rtype-btn active" data-type="none">없음</button>
      <button class="rtype-btn" data-type="daily">매일</button>
      <button class="rtype-btn" data-type="weekly">매주</button>
      <button class="rtype-btn" data-type="monthly">매월</button>
      <button class="rtype-btn" data-type="yearly">매년</button>
      <button class="rtype-btn" data-type="custom">커스텀</button>
    </div>
    <div id="repeat-weekly-wrap" class="repeat-detail hidden">
      <label class="repeat-sub-label">요일 선택</label>
      <div id="repeat-weekday-btns">
        <button class="rday-btn" data-d="0">일</button><button class="rday-btn" data-d="1">월</button>
        <button class="rday-btn" data-d="2">화</button><button class="rday-btn" data-d="3">수</button>
        <button class="rday-btn" data-d="4">목</button><button class="rday-btn" data-d="5">금</button>
        <button class="rday-btn" data-d="6">토</button>
      </div>
    </div>
    <div id="repeat-monthly-wrap" class="repeat-detail hidden">
      <div id="repeat-monthly-mode-row">
        <button class="rmonth-mode-btn active" data-mode="day">N일</button>
        <button class="rmonth-mode-btn" data-mode="week">X째주 Y요일</button>
      </div>
      <div id="repeat-monthly-day-wrap" class="repeat-option">
        <label>매월</label>
        <input type="number" id="repeat-monthly-day" min="1" max="31" placeholder="1" />
        <span>일</span>
      </div>
      <div id="repeat-monthly-week-wrap" class="repeat-option hidden">
        <select id="repeat-monthly-week">
          <option value="1">첫째</option><option value="2">둘째</option>
          <option value="3">셋째</option><option value="4">넷째</option><option value="5">마지막</option>
        </select>
        <select id="repeat-monthly-weekday">
          <option value="0">일요일</option><option value="1">월요일</option><option value="2">화요일</option>
          <option value="3">수요일</option><option value="4">목요일</option><option value="5">금요일</option>
          <option value="6">토요일</option>
        </select>
      </div>
    </div>
    <div id="repeat-yearly-wrap" class="repeat-detail hidden">
      <div class="repeat-option">
        <label>매년</label>
        <select id="repeat-yearly-month">
          <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option>
          <option value="4">4월</option><option value="5">5월</option><option value="6">6월</option>
          <option value="7">7월</option><option value="8">8월</option><option value="9">9월</option>
          <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
        </select>
        <input type="number" id="repeat-yearly-day" min="1" max="31" placeholder="1" />
        <span>일</span>
      </div>
    </div>
    <div id="repeat-custom-wrap" class="repeat-detail hidden">
      <label class="repeat-sub-label">요일 선택 (복수)</label>
      <div id="repeat-custom-day-btns">
        <button class="rday-btn" data-d="0">일</button><button class="rday-btn" data-d="1">월</button>
        <button class="rday-btn" data-d="2">화</button><button class="rday-btn" data-d="3">수</button>
        <button class="rday-btn" data-d="4">목</button><button class="rday-btn" data-d="5">금</button>
        <button class="rday-btn" data-d="6">토</button>
      </div>
    </div>
    <div class="repeat-option">
      <label class="repeat-end-label">
        <input type="checkbox" id="repeat-end-toggle" />
        <span>종료일 설정</span>
      </label>
      <div id="repeat-end-date-wrap" class="hidden">
        <input type="date" id="repeat-end-date" />
      </div>
    </div>
    <div id="repeat-footer">
      <button id="repeat-cancel-btn" class="repeat-footer-btn cancel">취소</button>
      <button id="repeat-confirm-btn" class="repeat-footer-btn confirm">확인</button>
    </div>
  </div>
</div>

<!-- ===== 액션 팝업 ===== -->
<div id="action-popup" class="hidden">
  <div id="action-box">
    <button class="action-btn" id="action-tomorrow">📅 1일 뒤</button>
    <button class="action-btn" id="action-pick-date">🗓 날짜 선택</button>
    <button class="action-btn danger" id="action-delete">🗑 삭제</button>
  </div>
  <input type="date" id="action-date-picker" class="hidden" />
</div>

<!-- ===== 년도 팝업 ===== -->
<div id="year-popup" class="hidden">
  <div id="year-box">
    <label>년도 입력</label>
    <input type="number" id="year-input" min="1900" max="2100" />
    <div id="year-btns">
      <button id="year-cancel">취소</button>
      <button id="year-confirm">확인</button>
    </div>
  </div>
</div>

<!-- ===== 월 팝업 ===== -->
<div id="month-popup" class="hidden">
  <div id="month-box">
    <div id="month-grid">
      <button class="month-btn" data-m="1">1월</button><button class="month-btn" data-m="2">2월</button>
      <button class="month-btn" data-m="3">3월</button><button class="month-btn" data-m="4">4월</button>
      <button class="month-btn" data-m="5">5월</button><button class="month-btn" data-m="6">6월</button>
      <button class="month-btn" data-m="7">7월</button><button class="month-btn" data-m="8">8월</button>
      <button class="month-btn" data-m="9">9월</button><button class="month-btn" data-m="10">10월</button>
      <button class="month-btn" data-m="11">11월</button><button class="month-btn" data-m="12">12월</button>
    </div>
  </div>
</div>

<!-- ===== 체크리스트 모달 ===== -->
<div id="checklist-overlay" class="hidden">
  <div id="checklist-box">
    <div id="checklist-header">
      <span>체크 리스트</span>
      <button id="checklist-modal-close">✕</button>
    </div>
    <div id="checklist-items"></div>
    <div id="checklist-add-row">
      <input type="text" id="checklist-input" placeholder="" autocomplete="off" />
      <button id="checklist-add-btn">＋</button>
    </div>
    <div id="checklist-footer">
      <button id="checklist-cancel-btn" class="checklist-footer-btn cancel">취소</button>
      <button id="checklist-confirm-btn" class="checklist-footer-btn confirm">확인</button>
    </div>
  </div>
</div>

<!-- ===== 반복 수정 시트 ===== -->
<div id="repeat-edit-overlay" class="hidden">
  <div id="repeat-edit-box">
    <div class="rds-title">반복 일정 수정</div>
    <button class="rds-btn" id="repeat-edit-only">이 날짜만 수정</button>
    <button class="rds-btn" id="repeat-edit-from">이 날짜 이후 모두 수정</button>
    <button class="rds-btn" id="repeat-edit-all">전체 수정</button>
    <button class="rds-btn cancel" id="repeat-edit-cancel">취소</button>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/sync.js"></script>
