<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="디데이">
<title>디데이</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base:      #16181d;
  --bg-surface:   #1e2028;
  --bg-elevated:  #262932;
  --bg-hover:     #2e3240;
  --accent:       #7ecfa0;
  --accent-dim:   #4a9e6d;
  --accent-glow:  rgba(126,207,160,0.15);
  --text-primary:   #e8eaf0;
  --text-secondary: #8b90a0;
  --text-muted:     #555a6a;
  --border:       #2a2d38;
  --border-light: #333748;
  --danger:       #e05c6a;
  --radius: 12px;
  --radius-sm: 8px;
  --font-main: 'Noto Sans KR', sans-serif;
  --font-ui:   'DM Sans', sans-serif;
  --bottom-safe: env(safe-area-inset-bottom, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-main);
  background: var(--bg-base);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}
button { border: none; cursor: pointer; background: none; color: inherit; font-family: inherit; }
input { font-family: inherit; }

#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
}

/* ── 헤더 ── */
.app-header {
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.app-header-inner { display: flex; align-items: center; gap: 8px; }
.app-icon { font-size: 20px; line-height: 1; }
.app-title {
  font-family: var(--font-ui);
  font-size: 17px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.3px;
}

/* ── 스크롤 영역 ── */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 0 14px calc(24px + var(--bottom-safe));
}
.scroll-area::-webkit-scrollbar { width: 3px; }
.scroll-area::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

/* ── 패널 헤더 ── */
.panel-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0 12px;
}
.panel-title {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.8px;
  text-transform: uppercase;
}
.panel-hd-right { display: flex; align-items: center; gap: 8px; }

/* ── 버튼들 ── */
.add-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--accent);
  color: #1a1a2e;
  font-size: 22px;
  font-weight: 300;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 3px 10px rgba(126,207,160,0.35);
  transition: transform 0.15s, box-shadow 0.15s;
  line-height: 1;
}
.add-btn:hover { transform: scale(1.08); }
.add-btn:active { transform: scale(0.93); }

.io-btn {
  height: 30px;
  padding: 0 10px;
  border-radius: 20px;
  background: var(--bg-elevated);
  color: var(--text-secondary);
  border: 1px solid var(--border-light);
  font-size: 13px;
  cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  flex-shrink: 0;
  white-space: nowrap;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.io-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
.io-btn-label { font-size: 11px; font-weight: 500; font-family: var(--font-ui); }

/* ── 카드 리스트 ── */
.item-list { display: flex; flex-direction: column; gap: 8px; }

.item-card {
  background: var(--bg-surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 13px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: border-color 0.15s, background 0.15s;
  user-select: none;
}
.item-card:hover { background: var(--bg-elevated); border-color: var(--border-light); }

/* 좌측 컬러 바 */
.dday-accent-bar {
  width: 3px;
  height: 36px;
  border-radius: 2px;
  flex-shrink: 0;
}
.bar-future { background: var(--accent); }
.bar-today  { background: #6bc5e8; }
.bar-past   { background: var(--text-muted); }

.item-body { flex: 1; min-width: 0; }
.item-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.4;
}
.item-meta {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 3px;
  font-family: var(--font-ui);
}

.item-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

.edit-btn, .del-btn {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.edit-btn {
  background: var(--bg-elevated);
  color: var(--text-secondary);
  border: 1px solid var(--border-light);
}
.edit-btn:hover { background: var(--bg-hover); color: var(--accent); border-color: var(--accent); }
.del-btn {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid transparent;
}
.del-btn:hover { background: rgba(224,92,106,0.12); color: var(--danger); border-color: rgba(224,92,106,0.3); }

/* ── D-Day 배지 ── */
.dday-badge {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  min-width: 62px;
  text-align: center;
  flex-shrink: 0;
  letter-spacing: -0.2px;
}
.badge-future { background: var(--accent-glow); color: var(--accent); border: 1px solid rgba(126,207,160,0.25); }
.badge-today  { background: rgba(107,197,232,0.12); color: #6bc5e8; border: 1px solid rgba(107,197,232,0.25); }
.badge-past   { background: rgba(255,255,255,0.04); color: var(--text-muted); border: 1px solid var(--border); }

/* ── 빈 상태 ── */
.empty-msg {
  text-align: center;
  padding: 52px 0;
  color: var(--text-muted);
  font-size: 13px;
}
.empty-msg .empty-icon {
  font-size: 38px;
  display: block;
  margin-bottom: 12px;
  opacity: 0.35;
}

/* ── 모달 ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  backdrop-filter: blur(4px);
}
.modal-overlay.hidden { display: none; }

.modal-box {
  background: var(--bg-elevated);
  border-radius: var(--radius) var(--radius) 0 0;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  padding: 20px 20px calc(28px + var(--bottom-safe));
  animation: slideUp 0.25s cubic-bezier(0.4,0,0.2,1);
  border-top: 1px solid var(--border-light);
}
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal-title {
  font-family: var(--font-ui);
  font-size: 15px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 16px;
}

.form-group { margin-bottom: 14px; }
.form-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 7px;
  display: block;
  font-family: var(--font-ui);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.form-input {
  width: 100%;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-light);
  background: var(--bg-surface);
  font-size: 14px;
  color: var(--text-primary);
  outline: none;
  font-family: var(--font-main);
  transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text-muted); }

.date-row { display: flex; gap: 6px; align-items: center; }
.date-row .form-input { text-align: center; }
.date-sep {
  color: var(--text-muted);
  font-weight: 600;
  font-size: 14px;
  flex-shrink: 0;
  font-family: var(--font-ui);
}

.modal-acts { display: flex; gap: 8px; margin-top: 20px; }
.btn-cancel {
  flex: 1; padding: 13px;
  border-radius: var(--radius-sm);
  background: var(--bg-hover);
  color: var(--text-secondary);
  font-size: 14px; font-weight: 500;
  font-family: var(--font-ui);
  transition: background 0.15s;
}
.btn-cancel:hover { background: var(--bg-surface); }
.btn-save {
  flex: 2; padding: 13px;
  border-radius: var(--radius-sm);
  background: var(--accent);
  color: #1a1a2e;
  font-size: 14px; font-weight: 600;
  font-family: var(--font-ui);
  transition: opacity 0.15s, transform 0.1s;
}
.btn-save:hover { opacity: 0.9; }
.btn-save:active { transform: scale(0.98); }
</style>
</head>
<body>
<div id="app">
  <div class="app-header">
    <div class="app-header-inner">
      <span class="app-icon">⏳</span>
      <span class="app-title">디데이</span>
    </div>
  </div>

  <div class="scroll-area">
    <div class="panel-hd">
      <span class="panel-title">D-Day</span>
      <div class="panel-hd-right">
        <button class="io-btn" id="import-dd">📥<span class="io-btn-label">불러오기</span></button>
        <button class="io-btn" id="export-dd">📤<span class="io-btn-label">내보내기</span></button>
        <button class="add-btn" id="add-dd">+</button>
      </div>
    </div>
    <div class="item-list" id="dd-list"></div>
  </div>
  <input type="file" id="file-import-dd" accept=".json" style="display:none">
</div>

<div class="modal-overlay hidden" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="m-title">디데이 추가</div>
    <div class="form-group">
      <label class="form-label">제목</label>
      <input class="form-input" id="f-name" type="text" placeholder="제목을 입력하세요" />
    </div>
    <div class="form-group">
      <label class="form-label">날짜</label>
      <div class="date-row">
        <input class="form-input" id="f-y" type="number" placeholder="년" min="1900" max="2100" style="width:76px" inputmode="numeric" />
        <span class="date-sep">년</span>
        <input class="form-input" id="f-mo" type="number" placeholder="월" min="1" max="12" style="width:56px" inputmode="numeric" />
        <span class="date-sep">월</span>
        <input class="form-input" id="f-d" type="number" placeholder="일" min="1" max="31" style="width:56px" inputmode="numeric" />
        <span class="date-sep">일</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">메모 <span style="color:var(--text-muted);font-weight:400;text-transform:none">(선택)</span></label>
      <input class="form-input" id="f-memo" type="text" placeholder="간단한 메모" />
    </div>
    <div class="modal-acts">
      <button class="btn-cancel" id="m-cancel">취소</button>
      <button class="btn-save" id="m-save">저장</button>
    </div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
function today0(){const d=new Date();d.setHours(0,0,0,0);return d;}
function dayDiff(ds){return Math.round((new Date(ds+'T00:00:00')-today0())/86400000);}

let S={dd:[]};
function load(){try{S.dd=JSON.parse(localStorage.getItem('ss_dd')||'[]');}catch(e){S.dd=[];}}
function save(){localStorage.setItem('ss_dd',JSON.stringify(S.dd));}

function ddInfo(it){
  const diff=dayDiff(it.date);
  if(diff===0)return{text:'D-DAY',badgeCls:'badge-today',barCls:'bar-today'};
  if(diff<0)return{text:`+${Math.abs(diff)}일`,badgeCls:'badge-past',barCls:'bar-past'};
  return{text:`D-${diff}`,badgeCls:'badge-future',barCls:'bar-future'};
}

function renderDd(){
  const list=$('dd-list');list.innerHTML='';
  const sorted=[...S.dd].sort((a,b)=>(b.id||0)-(a.id||0));
  if(!sorted.length){
    list.innerHTML='<div class="empty-msg"><span class="empty-icon">⏳</span>디데이를 추가해보세요</div>';return;
  }
  sorted.forEach(it=>list.appendChild(makeCard(it)));
}

function makeCard(it){
  const inf=ddInfo(it);
  const card=document.createElement('div');card.className='item-card';

  const bar=document.createElement('div');bar.className=`dday-accent-bar ${inf.barCls}`;card.appendChild(bar);

  const body=document.createElement('div');body.className='item-body';
  const nameEl=document.createElement('div');nameEl.className='item-name';nameEl.textContent=it.name;
  body.appendChild(nameEl);
  const meta=document.createElement('div');meta.className='item-meta';
  const dp=it.date.replace(/-/g,'. ')+'.';
  meta.textContent=it.memo?`${dp}  ·  ${it.memo}`:dp;
  body.appendChild(meta);

  const acts=document.createElement('div');acts.className='item-actions';
  const badge=document.createElement('span');badge.className=`dday-badge ${inf.badgeCls}`;badge.textContent=inf.text;
  acts.appendChild(badge);

  const eb=document.createElement('button');eb.className='edit-btn';eb.textContent='✏️';
  eb.onclick=()=>{const oi=S.dd.findIndex(x=>x.id===it.id);openModal(it,oi);};
  const db=document.createElement('button');db.className='del-btn';db.textContent='✕';
  db.onclick=()=>delItem(it.id);
  acts.appendChild(eb);acts.appendChild(db);
  card.appendChild(body);card.appendChild(acts);
  return card;
}

let mCtx={item:null,idx:null};
function openModal(item,idx){
  mCtx={item,idx};const isE=item!==null;
  $('m-title').textContent=isE?'수정':'디데이 추가';
  $('f-name').value=isE?item.name:'';$('f-memo').value=isE?(item.memo||''):'';
  if(isE&&item.date){const[y,m,d]=item.date.split('-');$('f-y').value=+y;$('f-mo').value=+m;$('f-d').value=+d;}
  else{$('f-y').value='';$('f-mo').value='';$('f-d').value='';}
  $('modal').classList.remove('hidden');setTimeout(()=>$('f-name').focus(),100);
}
$('m-cancel').onclick=()=>$('modal').classList.add('hidden');
$('modal').onclick=e=>{if(e.target===$('modal'))$('modal').classList.add('hidden');};
$('m-save').onclick=()=>{
  const name=$('f-name').value.trim();if(!name){$('f-name').focus();return;}
  const{item,idx}=mCtx;const obj={id:item?.id||Date.now(),name,memo:$('f-memo').value.trim()};
  if(!$('f-y').value||!$('f-mo').value||!$('f-d').value){alert('날짜를 입력해주세요');return;}
  obj.date=`${String($('f-y').value).padStart(4,'0')}-${String($('f-mo').value).padStart(2,'0')}-${String($('f-d').value).padStart(2,'0')}`;
  if(idx!==null&&idx>=0)S.dd[idx]=obj;else S.dd.push(obj);
  save();renderDd();$('modal').classList.add('hidden');
};
function delItem(id){if(!confirm('삭제할까요?'))return;S.dd=S.dd.filter(x=>x.id!==id);save();renderDd();}
function exportData(){
  const date=new Date();
  const ds=`${date.getFullYear()}${String(date.getMonth()+1).padStart(2,'0')}${String(date.getDate()).padStart(2,'0')}`;
  const blob=new Blob([JSON.stringify(S.dd,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`soso_dday_${ds}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
function importData(file){
  if(!file)return;
  if(file.name.toLowerCase().includes('anniversary')){alert('형식이 다릅니다. 디데이 파일을 선택해주세요.');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!Array.isArray(data)){alert('올바른 파일이 아니에요.');return;}
      if(data.length>0&&data[0].month!==undefined){alert('형식이 다릅니다. 디데이 파일을 선택해주세요.');return;}
      if(confirm(`디데이 ${data.length}개를 불러올까요?\n기존 데이터는 덮어씌워져요.`)){S.dd=data;save();renderDd();alert('불러오기 완료!');}
    }catch(err){alert('파일을 읽을 수 없어요.');}
  };reader.readAsText(file);
}
$('add-dd').onclick=()=>openModal(null,null);
$('export-dd').onclick=()=>exportData();
$('import-dd').onclick=()=>$('file-import-dd').click();
$('file-import-dd').onchange=e=>{importData(e.target.files[0]);e.target.value='';};
load();renderDd();
</script>
</body>
</html>
