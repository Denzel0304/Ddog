<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>세션 초기화</title>
  <style>
    body {
      margin: 0;
      background: #16181d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Noto Sans KR', sans-serif;
      color: #e0e0e0;
      gap: 16px;
    }
    .msg { font-size: 15px; color: #aaa; }
    .done { font-size: 15px; color: #7ef7a0; display: none; }
    button {
      margin-top: 8px;
      padding: 12px 32px;
      border-radius: 10px;
      border: none;
      background: #7c6ef5;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: none;
    }
  </style>
</head>
<body>
  <div class="msg" id="msg">세션을 초기화하는 중...</div>
  <div class="done" id="done">✅ 초기화 완료! 로그인 화면으로 이동합니다.</div>
  <button id="go-btn" onclick="location.href='index.html'">로그인 화면으로 이동</button>

  <script>
    (function() {
      // 로그인 세션 토큰만 정확히 삭제 (다른 데이터 절대 건드리지 않음)
      localStorage.removeItem('sb_session');
      localStorage.removeItem('login_fails');
      localStorage.removeItem('login_lock_until');

      document.getElementById('msg').style.display = 'none';
      document.getElementById('done').style.display = 'block';
      document.getElementById('go-btn').style.display = 'block';

      // 2초 후 자동 이동
      setTimeout(() => {
        location.href = 'index.html';
      }, 2000);
    })();
  </script>
</body>
</html>
