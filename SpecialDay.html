<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="기념일">
<title>기념일</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base:      #16181d;
  --bg-surface:   #1e2028;
  --bg-elevated:  #262932;
  --bg-hover:     #2e3240;
  --accent:       #7ecfa0;
  --accent-dim:   #4a9e6d;
  --accent-glow:  rgba(126,207,160,0.15);
  --text-primary:   #e8eaf0;
  --text-secondary: #8b90a0;
  --text-muted:     #555a6a;
  --border:         #2a2d38;
  --border-light: #333748;
  --danger:       #e05c6a;
  --radius: 12px;
  --radius-sm: 8px;
  --font-main: 'Noto Sans KR', sans-serif;
  --font-ui:   'DM Sans', sans-serif;
  --bottom-safe: env(safe-area-inset-bottom, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-main);
  background: var(--bg-base);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}
button { border: none; cursor: pointer; background: none; color: inherit; font-family: inherit; }
input { font-family: inherit; }

#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
}

/* ── 헤더 ── */
.app-header {
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.app-header-inner { display: flex; align-items: center; gap: 8px; }
.app-icon { font-size: 20px; line-height: 1; }
.app-title {
  font-family: var(--font-ui);
  font-size: 17px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.3px;
}

/* ── 스크롤 영역 ── */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 0 14px calc(24px + var(--bottom-safe));
}
.scroll-area::-webkit-scrollbar { width: 3px; }
.scroll-area::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

/* ── 패널 헤더 ── */
.panel-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0 12px;
}
.panel-title {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.8px;
  text-transform: uppercase;
}
.panel-hd-right { display: flex; align-items: center; gap: 8px; }

/* ── 버튼들 ── */
.add-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--accent);
  color: #1a1a2e;
  font-size: 22px;
  font-weight: 300;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 3px 10px rgba(126,207,160,0.35);
  transition: transform 0.15s, box-shadow 0.15s;
  line-height: 1;
}
.add-btn:hover { transform: scale(1.08); }
.add-btn:active { transform: scale(0.93); }

.io-btn {
  height: 30px;
  padding: 0 10px;
  border-radius: 20px;
  background: var(--bg-elevated);
  color: var(--text-secondary);
  border: 1px solid var(--border-light);
  font-size: 13px;
  cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  flex-shrink: 0;
  white-space: nowrap;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.io-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
.io-btn-label { font-size: 11px; font-weight: 500; font-family: var(--font-ui); }

/* ── 카드 리스트 ── */
.item-list { display: flex; flex-direction: column; gap: 8px; }

.item-card {
  background: var(--bg-surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 13px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: border-color 0.15s, background 0.15s;
  user-select: none;
}
.item-card:hover { background: var(--bg-elevated); border-color: var(--border-light); }

.accent-bar {
  width: 3px;
  height: 36px;
  border-radius: 2px;
  flex-shrink: 0;
  background: var(--accent);
}
.accent-bar.bar-soon { background: #f0b455; }
.accent-bar.bar-today { background: #6bc5e8; }

.item-body { flex: 1; min-width: 0; }
.item-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.4;
  display: flex;
  align-items: center;
  gap: 6px;
}
.item-name-text {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.lunar-tag {
  font-size: 9px;
  background: rgba(150,120,255,0.2);
  color: #b09aff;
  border-radius: 4px;
  padding: 1px 5px;
  font-weight: 600;
  font-family: var(--font-ui);
  flex-shrink: 0;
  letter-spacing: 0.2px;
  border: 1px solid rgba(150,120,255,0.25);
}
.item-meta {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 3px;
  font-family: var(--font-ui);
}

.item-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

.edit-btn, .del-btn {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.edit-btn {
  background: var(--bg-elevated);
  color: var(--text-secondary);
  border: 1px solid var(--border-light);
}
.edit-btn:hover { background: var(--bg-hover); color: var(--accent); border-color: var(--accent); }
.del-btn {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid transparent;
}
.del-btn:hover { background: rgba(224,92,106,0.12); color: var(--danger); border-color: rgba(224,92,106,0.3); }

.dday-badge {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  min-width: 56px;
  text-align: center;
  flex-shrink: 0;
  letter-spacing: -0.2px;
}
.badge-normal { background: var(--accent-glow); color: var(--accent); border: 1px solid rgba(126,207,160,0.25); }
.badge-soon   { background: rgba(240,180,85,0.15); color: #f0b455; border: 1px solid rgba(240,180,85,0.25); }
.badge-today  { background: rgba(107,197,232,0.12); color: #6bc5e8; border: 1px solid rgba(107,197,232,0.25); }

.empty-msg {
  text-align: center;
  padding: 52px 0;
  color: var(--text-muted);
  font-size: 13px;
}
.empty-msg .empty-icon {
  font-size: 38px;
  display: block;
  margin-bottom: 12px;
  opacity: 0.35;
}

/* ── 테스트 도구 (임시) ── */
.test-box {
  margin-top: 40px;
  padding: 16px;
  background: var(--bg-surface);
  border: 1px dashed var(--border-light);
  border-radius: var(--radius);
}
.test-box h4 { font-size: 12px; color: var(--accent); margin-bottom: 10px; font-family: var(--font-ui); }

/* ── 모달 ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  backdrop-filter: blur(4px);
}
.modal-overlay.hidden { display: none; }

.modal-box {
  background: var(--bg-elevated);
  border-radius: var(--radius) var(--radius) 0 0;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  padding: 20px 20px calc(28px + var(--bottom-safe));
  animation: slideUp 0.25s cubic-bezier(0.4,0,0.2,1);
  border-top: 1px solid var(--border-light);
}
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal-title {
  font-family: var(--font-ui);
  font-size: 15px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 16px;
}

.form-group { margin-bottom: 14px; }
.form-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 7px;
  display: block;
  font-family: var(--font-ui);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.form-input {
  width: 100%;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-light);
  background: var(--bg-surface);
  font-size: 14px;
  color: var(--text-primary);
  outline: none;
  font-family: var(--font-main);
  transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--accent); }

.cal-row { display: flex; gap: 6px; margin-bottom: 10px; }
.cal-opt {
  flex: 1; padding: 9px 0;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-light);
  background: var(--bg-surface);
  font-size: 13px; font-weight: 500;
  cursor: pointer; text-align: center;
  color: var(--text-secondary);
  font-family: var(--font-ui);
  transition: all 0.15s;
}
.cal-opt.sel { background: var(--accent); border-color: var(--accent); color: #1a1a2e; font-weight: 600; }

.date-row { display: flex; gap: 6px; align-items: center; }
.date-sep { color: var(--text-muted); font-size: 14px; flex-shrink: 0; font-family: var(--font-ui); }

.modal-acts { display: flex; gap: 8px; margin-top: 20px; }
.btn-cancel {
  flex: 1; padding: 13px;
  border-radius: var(--radius-sm);
  background: var(--bg-hover);
  color: var(--text-secondary);
  font-size: 14px; font-weight: 500;
}
.btn-save {
  flex: 2; padding: 13px;
  border-radius: var(--radius-sm);
  background: var(--accent);
  color: #1a1a2e;
  font-size: 14px; font-weight: 600;
}
</style>
</head>
<body>
<div id="app">
  <div class="app-header">
    <div class="app-header-inner">
      <span class="app-icon">🎉</span>
      <span class="app-title">기념일</span>
    </div>
  </div>

  <div class="scroll-area">
    <div class="panel-hd">
      <span class="panel-title">Anniversary</span>
      <div class="panel-hd-right">
        <button class="io-btn" id="import-an">📥<span class="io-btn-label">불러오기</span></button>
        <button class="io-btn" id="export-an">📤<span class="io-btn-label">내보내기</span></button>
        <button class="add-btn" id="add-an">+</button>
      </div>
    </div>
    <div class="item-list" id="an-list"></div>

    <div class="test-box">
      <h4>음양력 변환 테스트 (검증용)</h4>
      <div class="date-row" style="margin-bottom:10px;">
        <input class="form-input" id="t-y" type="number" placeholder="년" style="width:70px" value="2026">
        <input class="form-input" id="t-m" type="number" placeholder="월" style="width:50px" value="2">
        <input class="form-input" id="t-d" type="number" placeholder="일" style="width:50px" value="17">
        <label style="font-size:11px; color:var(--text-secondary);"><input type="checkbox" id="t-leap"> 윤달</label>
      </div>
      <button class="io-btn" id="btn-test" style="width:100%; justify-content:center;">계산하기</button>
      <div id="test-res" style="margin-top:10px; font-size:13px; color:var(--accent); text-align:center; min-height:18px;"></div>
    </div>
  </div>
  <input type="file" id="file-import-an" accept=".json" style="display:none">
</div>

<div class="modal-overlay hidden" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="m-title">기념일 추가</div>
    <div class="form-group">
      <label class="form-label">제목</label>
      <input class="form-input" id="f-name" type="text" placeholder="제목을 입력하세요" />
    </div>
    <div class="form-group">
      <label class="form-label">날짜 유형</label>
      <div class="cal-row">
        <div class="cal-opt sel" id="cal-solar">양력</div>
        <div class="cal-opt" id="cal-lunar">음력</div>
      </div>
      <label class="form-label">날짜</label>
      <div class="date-row">
        <input class="form-input" id="f-am" type="number" placeholder="월" min="1" max="12" style="width:70px" inputmode="numeric" />
        <span class="date-sep">월</span>
        <input class="form-input" id="f-ad" type="number" placeholder="일" min="1" max="31" style="width:70px" inputmode="numeric" />
        <span class="date-sep">일</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">메모 <span style="color:var(--text-muted);">(선택)</span></label>
      <input class="form-input" id="f-memo" type="text" placeholder="간단한 메모" />
    </div>
    <div class="modal-acts">
      <button class="btn-cancel" id="m-cancel">취소</button>
      <button class="btn-save" id="m-save">저장</button>
    </div>
  </div>
</div>

const BASE_SOLAR = new Date(1940, 1, 8); // 1940년 음력 1월 1일의 양력 날짜

/**
 * 정밀 음력->양력 변환 함수
 */
function lunarToSolar(ly, lm, ld, isLeap = false) {
    if (ly < 1940 || ly > 2050) return null;

    let totalDays = 0;
    // 1940년부터 해당 년도 전까지의 총 일수 합산
    for (let y = 1940; y < ly; y++) {
        const data = LUNAR_DATA[y];
        data[0].forEach(d => totalDays += (d === 0 ? 29 : 30));
        if (data[1] > 0) totalDays += (data[2] === 0 ? 29 : 30);
    }

    const currentYearData = LUNAR_DATA[ly];
    const months = currentYearData[0];
    const leapMonth = currentYearData[1];
    const leapDayType = currentYearData[2];

    // 해당 년도 월별 합산
    for (let m = 1; m < lm; m++) {
        totalDays += (months[m - 1] === 0 ? 29 : 30);
        if (m === leapMonth) {
            totalDays += (leapDayType === 0 ? 29 : 30);
        }
    }

    // 윤달 당일 처리
    if (isLeap && lm === leapMonth) {
        totalDays += (months[lm - 1] === 0 ? 29 : 30);
    }

    totalDays += (ld - 1);
    
    const result = new Date(BASE_SOLAR);
    result.setDate(BASE_SOLAR.getDate() + totalDays);
    return result;
}

/**
 * 기념일 리스트용: 현재 시점 기준으로 가장 가까운 다가올 양력 날짜 찾기
 */
function getNextSolar(lm, ld, isLunar) {
    const now = new Date();
    now.setHours(0,0,0,0);
    const curY = now.getFullYear();

    if (!isLunar) {
        let d = new Date(curY, lm - 1, ld);
        if (d < now) d = new Date(curY + 1, lm - 1, ld);
        return d;
    } else {
        // 음력은 올해, 내년 중 가장 빠른 미래 날짜 선택
        const cands = [];
        for (let y = curY - 1; y <= curY + 1; y++) {
            const d = lunarToSolar(y, lm, ld, false);
            if (d) { d.setHours(0,0,0,0); cands.push(d); }
        }
        const future = cands.filter(d => d >= now).sort((a,b) => a-b);
        return future.length > 0 ? future[0] : cands[cands.length-1];
    }
}

// ── 기존 UI 로직 유지 ──
const $=id=>document.getElementById(id);
function today0(){const d=new Date();d.setHours(0,0,0,0);return d;}

function annivLeft(it){
    const dt = getNextSolar(it.month, it.day, it.lunar);
    const now = today0();
    return Math.round((dt - now) / 86400000);
}

let S={an:[]};
function load(){try{S.an=JSON.parse(localStorage.getItem('ss_an')||'[]');}catch(e){S.an=[];}}
function save(){localStorage.setItem('ss_an',JSON.stringify(S.an));}

function anInfo(it){
  const left=annivLeft(it);
  if(left===0)return{text:'D-DAY',badgeCls:'badge-today',barCls:'bar-today'};
  if(left<=7)return{text:`-${left}일`,badgeCls:'badge-soon',barCls:'bar-soon'};
  return{text:`-${left}일`,badgeCls:'badge-normal',barCls:''};
}

function renderAn(){
  const list=$('an-list');list.innerHTML='';
  const sorted=[...S.an].sort((a,b)=>annivLeft(a)-annivLeft(b));
  if(!sorted.length){
    list.innerHTML='<div class="empty-msg"><span class="empty-icon">🎉</span>기념일을 추가해보세요</div>';return;
  }
  sorted.forEach(it=>list.appendChild(makeCard(it)));
}

function makeCard(it){
  const inf=anInfo(it);
  const card=document.createElement('div');card.className='item-card';
  const bar=document.createElement('div');bar.className=`accent-bar ${inf.barCls}`;card.appendChild(bar);
  const body=document.createElement('div');body.className='item-body';
  const nameWrap=document.createElement('div');nameWrap.className='item-name';
  const nameText=document.createElement('span');nameText.className='item-name-text';nameText.textContent=it.name;
  nameWrap.appendChild(nameText);
  if(it.lunar){const tag=document.createElement('span');tag.className='lunar-tag';tag.textContent='음력';nameWrap.appendChild(tag);}
  body.appendChild(nameWrap);
  const meta=document.createElement('div');meta.className='item-meta';
  const datePart=`${it.month}월 ${it.day}일`;
  meta.textContent=it.memo?`${datePart}  ·  ${it.memo}`:datePart;
  body.appendChild(meta);
  const acts=document.createElement('div');acts.className='item-actions';
  const badge=document.createElement('span');badge.className=`dday-badge ${inf.badgeCls}`;badge.textContent=inf.text;
  acts.appendChild(badge);
  const eb=document.createElement('button');eb.className='edit-btn';eb.textContent='✏️';
  eb.onclick=()=>{const oi=S.an.findIndex(x=>x.id===it.id);openModal(it,oi);};
  const db=document.createElement('button');db.className='del-btn';db.textContent='✕';
  db.onclick=()=>delItem(it.id);
  acts.appendChild(eb);acts.appendChild(db);card.appendChild(body);card.appendChild(acts);
  return card;
}

let mCtx={item:null,idx:null};
let selCal='solar';

function openModal(item,idx){
  mCtx={item,idx};const isE=item!==null;
  $('m-title').textContent=isE?'수정':'기념일 추가';
  $('f-name').value=isE?item.name:'';$('f-memo').value=isE?(item.memo||''):'';
  selCal=isE?(item.lunar?'lunar':'solar'):'solar';updCal();
  $('f-am').value=isE?item.month:'';$('f-ad').value=isE?item.day:'';
  $('modal').classList.remove('hidden');
}
function updCal(){
  $('cal-solar').className='cal-opt'+(selCal==='solar'?' sel':'');
  $('cal-lunar').className='cal-opt'+(selCal==='lunar'?' sel':'');
}
$('cal-solar').onclick=()=>{selCal='solar';updCal();};
$('cal-lunar').onclick=()=>{selCal='lunar';updCal();};
$('m-cancel').onclick=()=>$('modal').classList.add('hidden');
$('modal').onclick=e=>{if(e.target===$('modal'))$('modal').classList.add('hidden');};
$('m-save').onclick=()=>{
  const name=$('f-name').value.trim();if(!name){$('f-name').focus();return;}
  const{item,idx}=mCtx;const obj={id:item?.id||Date.now(),name,memo:$('f-memo').value.trim()};
  const mon=+$('f-am').value,day=+$('f-ad').value;
  if(!mon||!day){alert('월과 일을 입력해주세요');return;}
  obj.month=mon;obj.day=day;obj.lunar=selCal==='lunar';
  if(idx!==null&&idx>=0)S.an[idx]=obj;else S.an.push(obj);
  save();renderAn();$('modal').classList.add('hidden');
};
function delItem(id){if(!confirm('삭제할까요?'))return;S.an=S.an.filter(x=>x.id!==id);save();renderAn();}

// ── 테스트 도구 로직 ──
$('btn-test').onclick = () => {
    const y = +$('t-y').value;
    const m = +$('t-m').value;
    const d = +$('t-d').value;
    const isLeap = $('t-leap').checked;
    const res = lunarToSolar(y, m, d, isLeap);
    if (res) {
        $('test-res').textContent = `양력: ${res.getFullYear()}년 ${res.getMonth()+1}월 ${res.getDate()}일`;
    } else {
        $('test-res').textContent = "범위 초과 (1940~2050)";
    }
};

// ── 기타 데이터 입출력 유지 ──
function exportData(){
  const date=new Date();
  const ds=`${date.getFullYear()}${String(date.getMonth()+1).padStart(2,'0')}${String(date.getDate()).padStart(2,'0')}`;
  const blob=new Blob([JSON.stringify(S.an,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`soso_anniversary_${ds}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
function importData(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!Array.isArray(data)){alert('올바른 파일이 아니에요.');return;}
      if(confirm(`기념일 ${data.length}개를 불러올까요?`)){S.an=data;save();renderAn();alert('완료!');}
    }catch(err){alert('파일 읽기 실패');}
  };reader.readAsText(file);
}
$('add-an').onclick=()=>openModal(null,null);
$('export-an').onclick=()=>exportData();
$('import-an').onclick=()=>$('file-import-an').click();
$('file-import-an').onchange=e=>{importData(e.target.files[0]);e.target.value='';};

load();renderAn();
</script>
