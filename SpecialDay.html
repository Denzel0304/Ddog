
<style>
:root{--bg:#16181d;--srf:#1e2028;--elv:#262932;--hov:#2e3240;--acc:#7ecfa0;--tp:#e8eaf0;--ts:#8b90a0;--tm:#555a6a;--bd:#2a2d38;--bdl:#333748;--danger:#e05c6a;--r:12px;--rs:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tp)}
.wrap{padding:14px;max-width:480px;margin:0 auto}
.stitle{font-size:11px;font-weight:500;color:var(--tm);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;font-family:'DM Sans',sans-serif}
.card{background:var(--srf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:10px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.row:last-child{margin-bottom:0}
.lbl{font-size:12px;color:var(--ts);font-family:'DM Sans',sans-serif;min-width:40px}
input[type=number]{background:var(--elv);border:1px solid var(--bdl);border-radius:var(--rs);color:var(--tp);padding:7px 10px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s;text-align:center}
input[type=number]:focus{border-color:var(--acc)}
input[type=number]::-webkit-inner-spin-button{opacity:.4}
.sep{color:var(--tm);font-weight:600;font-family:'DM Sans',sans-serif;font-size:13px}
.btn{background:var(--acc);color:#1a1a2e;border:none;border-radius:var(--rs);padding:8px 18px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.85}
.result-box{background:var(--elv);border:1px solid var(--bdl);border-radius:var(--rs);padding:10px 14px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--tp);min-height:36px}
.result-box.ok{border-color:rgba(126,207,160,.4);color:var(--acc)}
.result-box.err{border-color:rgba(224,92,106,.4);color:var(--danger)}
.bt{width:100%;border-collapse:collapse;font-size:12px;font-family:'DM Sans',sans-serif}
.bt th{color:var(--tm);font-weight:500;text-align:left;padding:5px 8px;border-bottom:1px solid var(--bd)}
.bt td{padding:6px 8px;border-bottom:1px solid var(--bd);color:var(--tp)}
.bt tr:last-child td{border-bottom:none}
.ok-c{color:var(--acc)}.err-c{color:var(--danger)}
.note{font-size:11px;color:var(--tm);margin-top:8px;font-family:'DM Sans',sans-serif;line-height:1.6}
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">

<div class="wrap">
<div class="stitle">음력 → 양력 (천문 계산 기반)</div>

<div class="card">
  <div class="row">
    <span class="lbl">음력</span>
    <input type="number" id="ty" value="2025" style="width:74px">
    <span class="sep">년</span>
    <input type="number" id="tm" value="1" min="1" max="13" style="width:52px">
    <span class="sep">월</span>
    <input type="number" id="td" value="1" min="1" max="30" style="width:52px">
    <span class="sep">일</span>
  </div>
  <div class="row">
    <span class="lbl" style="font-size:11px;color:var(--tm)">윤달?</span>
    <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ts);cursor:pointer;font-family:'DM Sans',sans-serif">
      <input type="checkbox" id="tleap" style="width:14px;height:14px;accent-color:var(--acc)"> 윤달
    </label>
  </div>
  <div class="row"><button class="btn" onclick="doConvert()">변환</button></div>
  <div class="result-box" id="tres">연도·월·일 입력 후 변환</div>
  <p class="note">※ 테이블 없이 순수 천문 계산 — 연도 제한 없음 (고려시대도 가능)<br>※ 한국 시간 기준(UTC+9), 한국천문연구원 알고리즘 적용</p>
</div>

<div class="stitle">검증 (공식 날짜 대조)</div>
<div class="card">
  <table class="bt" id="vtb">
    <tr><th>케이스</th><th>기대값</th><th>계산값</th><th></th></tr>
  </table>
  <p class="note">※ 불일치 시 아래 콘솔에서 상세 확인 가능</p>
</div>
</div>

<script>
/* ============================================================
   순수 천문 계산 기반 음력↔양력 변환
   Jean Meeus "Astronomical Algorithms" + 한국천문연구원 보정
   ============================================================ */

const RAD = Math.PI / 180;
const TZ  = 9; // UTC+9 KST

/* Julian Day Number ← 그레고리력 */
function jdFromGregorian(year, month, day) {
  if (month <= 2) { year--; month += 12; }
  const A = Math.floor(year / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (year + 4716)) + Math.floor(30.6001 * (month + 1)) + day + B - 1524.5;
}

/* 그레고리력 ← Julian Day Number */
function gregorianFromJD(jd) {
  const z = Math.floor(jd + 0.5);
  const f = (jd + 0.5) - z;
  let A = z;
  if (z >= 2299161) {
    const alpha = Math.floor((z - 1867216.25) / 36524.25);
    A = z + 1 + alpha - Math.floor(alpha / 4);
  }
  const B = A + 1524;
  const C = Math.floor((B - 122.1) / 365.25);
  const D = Math.floor(365.25 * C);
  const E = Math.floor((B - D) / 30.6001);
  const day   = B - D - Math.floor(30.6001 * E) + f;
  const month = E < 14 ? E - 1 : E - 13;
  const year  = month > 2 ? C - 4716 : C - 4715;
  return { year, month, day: Math.floor(day) };
}

/* 태양 황경 (도) — Meeus Ch.25 */
function sunLongitude(jde) {
  const T  = (jde - 2451545.0) / 36525;
  const L0 = 280.46646 + 36000.76983 * T + 0.0003032 * T * T;
  const M  = 357.52911 + 35999.05029 * T - 0.0001537 * T * T;
  const Mm = M * RAD;
  const C  = (1.914602 - 0.004817 * T - 0.000014 * T * T) * Math.sin(Mm)
           + (0.019993 - 0.000101 * T) * Math.sin(2 * Mm)
           + 0.000289 * Math.sin(3 * Mm);
  const sunLon = L0 + C;
  const Omega  = 125.04 - 1934.136 * T;
  const apparent = sunLon - 0.00569 - 0.00478 * Math.sin(Omega * RAD);
  return ((apparent % 360) + 360) % 360;
}

/* k번째 신월(삭)의 JDE — Meeus Ch.47 */
function newMoonJDE(k) {
  const T  = k / 1235.85;
  const T2 = T * T, T3 = T2 * T, T4 = T3 * T;
  let JDE = 2451550.09766 + 29.530588861 * k
           + 0.00015437 * T2 - 0.000000150 * T3 + 0.00000000073 * T4;
  const M   = (2.5534  + 29.10535670 * k - 0.0000014 * T2 - 0.00000011 * T3) * RAD;
  const Ml  = (201.5643 + 385.81693528 * k + 0.0107582 * T2 + 0.00001238 * T3 - 0.000000058 * T4) * RAD;
  const F   = (160.7108 + 390.67050284 * k - 0.0016118 * T2 - 0.00000227 * T3 + 0.000000011 * T4) * RAD;
  const Om  = (124.7746 - 1.56375588  * k + 0.0020672 * T2 + 0.00000215 * T3) * RAD;
  JDE += -0.40720 * Math.sin(Ml)
       +  0.17241 * Math.sin(M)
       +  0.01608 * Math.sin(2 * Ml)
       +  0.01039 * Math.sin(2 * F)
       +  0.00739 * Math.sin(Ml - M)
       -  0.00514 * Math.sin(Ml + M)
       +  0.00208 * Math.sin(2 * M)
       -  0.00111 * Math.sin(Ml - 2 * F)
       -  0.00057 * Math.sin(Ml + 2 * F)
       +  0.00056 * Math.sin(2 * Ml + M)
       -  0.00042 * Math.sin(3 * Ml)
       +  0.00042 * Math.sin(M + 2 * F)
       +  0.00038 * Math.sin(M - 2 * F)
       -  0.00024 * Math.sin(2 * Ml - M)
       -  0.00017 * Math.sin(Om)
       -  0.00007 * Math.sin(Ml + 2 * M)
       +  0.00004 * Math.sin(2 * Ml - 2 * F)
       +  0.00004 * Math.sin(3 * M)
       +  0.00003 * Math.sin(Ml + M - 2 * F)
       +  0.00003 * Math.sin(2 * Ml + 2 * F)
       -  0.00003 * Math.sin(Ml + M + 2 * F)
       +  0.00003 * Math.sin(Ml - M + 2 * F)
       -  0.00002 * Math.sin(Ml - M - 2 * F)
       -  0.00002 * Math.sin(3 * Ml + M)
       +  0.00002 * Math.sin(4 * Ml);
  return JDE;
}

/* JDE → KST 날짜(그레고리력) */
function jdeToKST(jde) {
  return gregorianFromJD(jde + TZ / 24);
}

/* 연도에 해당하는 k 시작값 추정 */
function kApprox(year) {
  return Math.floor((year - 2000) * 12.3685);
}

/*
  음력 1년 1월 1일 (KST 기준 삭) 목록 캐시
  key: 음력연도(정수)
  value: { months: [{jd, solar, sunLon},...], leapMonth: 0|N }
*/
const _cache = {};

/*
  특정 양력연도 근처의 삭 목록 빌드
  음력연도 lYear 의 1월 1일을 구하기 위해
  대략 lYear 양력연도 전후 삭을 순회
*/
function buildLunarYear(lYear) {
  if (_cache[lYear]) return _cache[lYear];

  // 해당 음력연도의 정월(1월) 삭을 탐색
  // 음력 1년 1월은 동지(양력 12월 22일경) 이후 두 번째 삭
  // 동지가 포함된 달부터 세어서 달력 구성

  // 1. 해당 lYear 양력 12월 이전의 동지(冬至, 태양황경 270°) 찾기
  function findDongji(solarYear) {
    // 동지는 12월 21~22일경, 태양황경 270°
    let jd = jdFromGregorian(solarYear, 12, 1);
    for (let i = 0; i < 40; i++) {
      const lon = sunLongitude(jd + i);
      const lonNext = sunLongitude(jd + i + 1);
      // 270° 통과
      if ((lon <= 270 && lonNext >= 270) || (lon > 350 && lonNext < 10)) {
        // 이진탐색 정밀화
        let lo = jd + i, hi = jd + i + 1;
        for (let j = 0; j < 50; j++) {
          const mid = (lo + hi) / 2;
          const m = sunLongitude(mid);
          if (Math.abs(m - 270) < 0.0001) return mid;
          if (m < 270) lo = mid; else hi = mid;
        }
        return (lo + hi) / 2;
      }
    }
    return jd + 10;
  }

  // 2. lYear-1 의 동지 이후 첫 삭 찾기 (이 삭이 포함된 달부터 구성)
  const dongji = findDongji(lYear - 1);
  
  // 동지 직전 삭을 k로 추정
  let k0 = kApprox(lYear - 1);
  // k를 동지 이전으로 조정
  while (newMoonJDE(k0) > dongji) k0--;
  while (newMoonJDE(k0 + 1) <= dongji) k0++;
  // k0: 동지를 포함하는 달의 삭

  // 3. 삭 15개 수집 (13달 음력년 + 여유)
  const newMoons = [];
  for (let i = 0; i <= 14; i++) {
    const jde = newMoonJDE(k0 + i);
    const kst = jdeToKST(jde);
    const jdFloor = Math.floor(jde + TZ / 24); // KST 자정 JD
    newMoons.push({ k: k0 + i, jde, kst, jd: jdFloor, sunLon: sunLongitude(jde) });
  }

  // 4. 다음 동지
  const nextDongji = findDongji(lYear);

  // 5. 동지→다음동지 사이 삭의 수
  const inYear = newMoons.filter(m => m.jde >= dongji && m.jde < nextDongji);
  const isLeapYear = inYear.length === 13;

  // 6. 중기(中氣, 짝수 절기: 우수·춘분·곡우…) 포함 여부로 윤달 판정
  // 중기: 황경 30°, 60°, 90°, ... (0°=춘분 기준. 실제 한국은 동지=270° 기준 순환)
  // 중기 없는 달이 윤달
  function hasMajorSolarTerm(jdStart, jdEnd) {
    // 30° 간격 중기 통과 여부
    const step = 0.5;
    const lonStart = sunLongitude(jdStart);
    for (let d = 0; d < jdEnd - jdStart; d += step) {
      const l1 = sunLongitude(jdStart + d);
      const l2 = sunLongitude(jdStart + d + step);
      const diff = ((l2 - l1) + 360) % 360;
      if (diff < 5) { // 정방향
        const crossed = Math.floor(l1 / 30) !== Math.floor(l2 / 30)
                     || (l1 > 350 && l2 < 10);
        if (crossed) return true;
      }
    }
    return false;
  }

  // 7. 달 번호 부여
  // inYear[0]은 동지 포함 달 = 음력 11월
  // 순서대로: 11, 12, 1(정월), 2, 3, ...
  // 윤달이면 중기 없는 달에 직전 달 번호 재사용

  let monthNum = 11; // 동지 달 = 11월
  const months = [];
  let leapMonth = 0;
  let leapInserted = false;

  for (let i = 0; i < inYear.length; i++) {
    const nm = inYear[i];
    const nextNm = inYear[i + 1] || newMoons[newMoons.indexOf(nm) + 1];
    if (!nextNm) break;

    if (isLeapYear && !leapInserted && i > 0) {
      // 중기 없으면 윤달
      if (!hasMajorSolarTerm(nm.jde, nextNm.jde)) {
        months.push({ month: monthNum, isLeap: true, jd: nm.jd, jde: nm.jde, kst: nm.kst });
        leapMonth = monthNum;
        leapInserted = true;
        continue;
      }
    }

    months.push({ month: monthNum, isLeap: false, jd: nm.jd, jde: nm.jde, kst: nm.kst });
    monthNum = monthNum === 12 ? 1 : monthNum + 1;
  }

  // 정월(1월) 기준으로 음력 연도 재정렬
  // months 중 month===1 이고 isLeap===false 인 인덱스부터가 해당 음력연도
  const janIdx = months.findIndex(m => m.month === 1 && !m.isLeap);

  const result = {
    months: months.slice(janIdx),          // 1월부터 시작
    prevMonths: months.slice(0, janIdx),   // 이전 연도 말달들
    leapMonth,
  };
  _cache[lYear] = result;
  return result;
}

/*
  음력 → 양력
  lYear: 음력연도, lMonth: 월(1~12), lDay: 일(1~30), isLeap: 윤달여부
  returns { year, month, day } 그레고리력
*/
function lunarToSolar(lYear, lMonth, lDay, isLeap = false) {
  const data = buildLunarYear(lYear);
  const entry = data.months.find(m => m.month === lMonth && m.isLeap === isLeap);
  if (!entry) {
    // 못찾으면 다음해에서도 탐색 (12월 이후 넘어간 경우)
    const data2 = buildLunarYear(lYear + 1);
    const e2 = data2.prevMonths ? data2.prevMonths.find(m => m.month === lMonth) : null;
    if (!e2) return null;
    const jd = e2.jd + lDay - 1;
    return gregorianFromJD(jd);
  }
  const jd = entry.jd + lDay - 1;
  return gregorianFromJD(jd);
}

/* 테스트 케이스 */
const TESTS = [
  {label:'2025 설날 (음1/1)',   ly:2025, lm:1,  ld:1,  leap:false, exp:'2025-01-29'},
  {label:'2024 설날 (음1/1)',   ly:2024, lm:1,  ld:1,  leap:false, exp:'2024-02-10'},
  {label:'2023 설날 (음1/1)',   ly:2023, lm:1,  ld:1,  leap:false, exp:'2023-01-22'},
  {label:'2022 설날 (음1/1)',   ly:2022, lm:1,  ld:1,  leap:false, exp:'2022-02-01'},
  {label:'2025 추석 (음8/15)',  ly:2025, lm:8,  ld:15, leap:false, exp:'2025-10-06'},
  {label:'2024 추석 (음8/15)',  ly:2024, lm:8,  ld:15, leap:false, exp:'2024-09-17'},
  {label:'2020 윤4월15일',      ly:2020, lm:4,  ld:15, leap:true,  exp:'2020-06-06'},
  {label:'2017 추석 (음8/15)',  ly:2017, lm:8,  ld:15, leap:false, exp:'2017-10-04'},
  {label:'2000 설날 (음1/1)',   ly:2000, lm:1,  ld:1,  leap:false, exp:'2000-02-05'},
  {label:'1900 음1/1',          ly:1900, lm:1,  ld:1,  leap:false, exp:'1900-01-31'},
];

function toStr(o) {
  if (!o) return '오류';
  return `${o.year}-${String(o.month).padStart(2,'0')}-${String(o.day).padStart(2,'0')}`;
}
function fmtKor(s) {
  const [y,m,d] = s.split('-');
  return `${y}년 ${+m}월 ${+d}일`;
}

const tb = document.getElementById('vtb');
TESTS.forEach(tc => {
  const res = lunarToSolar(tc.ly, tc.lm, tc.ld, tc.leap);
  const got = toStr(res);
  const ok  = got === tc.exp;
  const tr  = document.createElement('tr');
  tr.innerHTML = `<td style="color:var(--ts);font-size:11px">${tc.label}</td>
    <td>${fmtKor(tc.exp)}</td>
    <td class="${ok?'ok-c':'err-c'}">${res?fmtKor(got):'오류'}</td>
    <td style="font-size:11px" class="${ok?'ok-c':'err-c'}">${ok?'✓':'✗'}</td>`;
  tb.appendChild(tr);
});

function doConvert() {
  const y = +document.getElementById('ty').value;
  const m = +document.getElementById('tm').value;
  const d = +document.getElementById('td').value;
  const leap = document.getElementById('tleap').checked;
  const el = document.getElementById('tres');
  if (!y||!m||!d) { el.className='result-box err'; el.textContent='연도·월·일을 입력하세요'; return; }
  const res = lunarToSolar(y, m, d, leap);
  if (!res) { el.className='result-box err'; el.textContent='변환 실패 (해당 날짜 없음)'; return; }
  const dt = new Date(res.year, res.month-1, res.day);
  const wd = ['일','월','화','수','목','금','토'][dt.getDay()];
  el.className='result-box ok';
  el.textContent=`음력 ${y}년 ${leap?'윤':''}${m}월 ${d}일  →  양력 ${res.year}년 ${res.month}월 ${res.day}일 (${wd}요일)`;
}
</script>
